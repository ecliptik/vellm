# dosbox-x.conf — Pentium / 48 MB profile for vellm
#
# Target: Intel Pentium Overdrive PODP5V83 (P54C core, 83 MHz, no MMX), 48 MB RAM,
# VGA text mode. Used for pre-hardware smoke tests and the golden-output diff gate.
#
# Only the options we care about are set; everything else uses DOSBox-X defaults.
# dosbox-run.sh supplies the C:\ mount and RUN.BAT invocation via -c commands,
# so the [autoexec] section is intentionally empty.
#
# Refinement note: cycles=fixed 90000 is a starting point for 83 MHz Pentium
# integer perf. Re-calibrate later with a reference benchmark if wall-clock
# numbers start mattering (Phase 5).

[sdl]
# Headless CI runs use `dosbox-x -silent -exit`; no SDL window is opened.
fullscreen = false
output     = surface

[dosbox]
# vgaonly — we only need a VGA-class text mode; no SVGA features.
machine = vgaonly
# 48 MB matches the Anigma LP4IP1 build.
memsize = 48
# Keep captures inside the vellm repo tree if a human ever runs this
# interactively. dosbox-run.sh sets this per-invocation when needed.
# captures = captures

[cpu]
# P54C Pentium without MMX. DOSBox-X's `pentium` tracks P5 FPU + no MMX.
cputype = pentium
# `normal` core for deterministic emulation (dynamic core can reorder in ways
# that break byte-exact golden diffs). Swap to `dynamic` for Phase 5 perf runs.
core    = normal
# ~83 MHz P54C integer perf starting point. Adjust with a calibration benchmark
# if later phases need better wall-clock fidelity.
cycles  = fixed 90000

[dos]
# XMS/EMS on — DPMI hosts like CWSDPMI expect XMS available.
xms  = true
ems  = true
umb  = true

[render]
# Cheap rendering — we don't need scaling and this saves a few cycles in headless.
aspect    = false
scaler    = none

[autoexec]
# Left intentionally empty. dosbox-run.sh injects mount + RUN.BAT via -c flags.
